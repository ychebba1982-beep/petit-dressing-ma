<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Petit Dressing MA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brown: #5c3d2e;
    --teal: #2a9d8f;
    --teal-light: #52b8ac;
    --orange: #e76f51;
    --cream: #fdf8f2;
    --gold: #c9a84c;
    --dark: #2d1b10;
    --text: #3d2b1f;
    --text-light: #7a5c4a;
    --shadow: 0 4px 24px rgba(92,61,46,0.10);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-style: italic; font-family: 'Nunito', sans-serif; }

  body { background: var(--cream); color: var(--text); min-height: 100vh; }

  /* ===== LOGIN ===== */
  #loginScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #fdf8f2 0%, #e8f7f5 100%);
    padding: 24px;
  }

  .login-card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(92,61,46,0.15);
    text-align: center;
  }

  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--brown);
    margin-bottom: 6px;
  }

  .login-logo span { color: var(--teal); }

  .login-sub {
    color: var(--text-light);
    font-size: 0.88rem;
    margin-bottom: 32px;
  }

  .login-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }

  .form-group {
    margin-bottom: 16px;
    text-align: left;
  }

  .form-group label {
    display: block;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-light);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid rgba(92,61,46,0.12);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--text);
    background: #fafafa;
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--teal);
    background: white;
  }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    font-style: italic;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(42,157,143,0.3);
    margin-top: 8px;
  }

  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(42,157,143,0.4); }

  .login-error {
    color: var(--orange);
    font-size: 0.85rem;
    margin-top: 12px;
    display: none;
  }

  /* ===== ADMIN PANEL ===== */
  #adminPanel { display: none; }

  .admin-header {
    background: linear-gradient(135deg, var(--brown), #3d2212);
    color: white;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  .admin-header-left {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: white;
  }

  .admin-header-left span { color: var(--teal-light); }

  .admin-header-right { display: flex; gap: 12px; align-items: center; }

  .btn-view-site {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 16px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    font-style: italic;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }

  .btn-view-site:hover { background: rgba(255,255,255,0.25); }

  .btn-logout {
    background: rgba(231,111,81,0.2);
    color: #ffb4a0;
    border: 1px solid rgba(231,111,81,0.4);
    padding: 8px 16px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    font-style: italic;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-logout:hover { background: rgba(231,111,81,0.35); }

  .admin-body {
    max-width: 1200px;
    margin: 0 auto;
    padding: 36px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }

  /* ===== FORM PANEL ===== */
  .panel {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .panel-header {
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: white;
    padding: 18px 24px;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-body { padding: 24px; }

  .image-upload-zone {
    border: 2px dashed rgba(42,157,143,0.4);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(42,157,143,0.03);
    position: relative;
  }

  .image-upload-zone:hover {
    border-color: var(--teal);
    background: rgba(42,157,143,0.06);
  }

  .image-upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
  .upload-text { color: var(--text-light); font-size: 0.88rem; }
  .upload-text strong { color: var(--teal); }

  .image-preview {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 10px;
    margin-top: 12px;
    display: none;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    font-style: italic;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(42,157,143,0.3);
  }

  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(42,157,143,0.4); }

  .success-msg {
    background: rgba(42,157,143,0.1);
    border: 1px solid rgba(42,157,143,0.3);
    color: var(--teal);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 700;
    margin-top: 12px;
    display: none;
    text-align: center;
  }

  /* ===== ARTICLES LIST ===== */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .stat-card-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--teal);
    font-weight: 700;
  }

  .stat-card-label {
    font-size: 0.75rem;
    color: var(--text-light);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .articles-list { display: flex; flex-direction: column; gap: 10px; }

  .article-item {
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    transition: transform 0.2s;
  }

  .article-item:hover { transform: translateX(4px); }

  .article-item-img {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    object-fit: cover;
    background: linear-gradient(135deg, #e8f7f5, #fef3eb);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
  }

  .article-item-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
  }

  .article-item-info { flex: 1; min-width: 0; }

  .article-item-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--brown);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .article-item-meta {
    font-size: 0.78rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  .article-item-price {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--brown);
    font-weight: 700;
    flex-shrink: 0;
  }

  .article-item-price span {
    font-size: 0.72rem;
    font-family: 'Nunito', sans-serif;
    color: var(--text-light);
  }

  .btn-delete {
    background: rgba(231,111,81,0.1);
    color: var(--orange);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .btn-delete:hover { background: rgba(231,111,81,0.25); }

  .cat-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 50px;
    font-size: 0.7rem;
    font-weight: 700;
    background: rgba(42,157,143,0.1);
    color: var(--teal);
    margin-right: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-light);
  }

  .empty-state-icon { font-size: 3rem; margin-bottom: 12px; display: block; }

  @media (max-width: 768px) {
    .admin-body { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 480px) {
    .login-card { padding: 32px 24px; }
    .admin-header { padding: 12px 16px; }
    .stats-bar { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <span class="login-icon">🔐</span>
    <div class="login-logo">Petit <span>Dressing</span></div>
    <div class="login-sub">Espace administration</div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="passwordInput" placeholder="Entrez votre mot de passe" onkeydown="if(event.key==='Enter') login()">
    </div>
    <button class="btn-login" onclick="login()">🔓 Accéder à l'admin</button>
    <div class="login-error" id="loginError">❌ Mot de passe incorrect</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <!-- HEADER -->
  <div class="admin-header">
    <div class="admin-header-left">🛍️ Petit <span>Dressing</span> — Admin</div>
    <div class="admin-header-right">
      <a href="index.html" target="_blank" class="btn-view-site">👁️ Voir le site</a>
      <button class="btn-logout" onclick="logout()">🚪 Déconnexion</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- FORM PANEL -->
    <div>
      <div class="panel">
        <div class="panel-header">➕ Ajouter un nouvel article</div>
        <div class="panel-body">

          <!-- IMAGE UPLOAD -->
          <div class="form-group">
            <label>Photo de l'article</label>
            <div class="image-upload-zone" id="uploadZone">
              <input type="file" accept="image/*" onchange="previewImage(event)" id="imageInput">
              <span class="upload-icon">📸</span>
              <div class="upload-text">
                <strong>Cliquez pour choisir une photo</strong><br>
                ou glissez-déposez ici
              </div>
            </div>
            <img id="imagePreview" class="image-preview" alt="Aperçu">
          </div>

          <!-- NOM -->
          <div class="form-group">
            <label>Nom de l'article</label>
            <input type="text" id="artNom" placeholder="Ex: Set Butterfly, Jean H&M...">
          </div>

          <!-- CATEGORIE + TAILLE -->
          <div class="form-row">
            <div class="form-group">
              <label>Catégorie</label>
              <select id="artCat">
                <option value="fille">👧 Fille</option>
                <option value="garcon">👦 Garçon</option>
                <option value="bebe">👶 Bébé</option>
                <option value="set">👕 Set</option>
              </select>
            </div>
            <div class="form-group">
              <label>Taille</label>
              <input type="text" id="artTaille" placeholder="Ex: 3-4 ans, 4-6 mois...">
            </div>
          </div>

          <!-- PRIX -->
          <div class="form-group">
            <label>Prix (DH)</label>
            <input type="number" id="artPrix" placeholder="Ex: 89">
          </div>

          <!-- DESCRIPTION -->
          <div class="form-group">
            <label>Description</label>
            <textarea id="artDesc" rows="3" placeholder="Ex: Top rose avec motif papillon + legging Benetton, très bon état..."></textarea>
          </div>

          <button class="btn-submit" onclick="ajouterArticle()">✅ Publier l'article sur le site</button>
          <div class="success-msg" id="successMsg">🎉 Article publié avec succès !</div>
        </div>
      </div>
    </div>

    <!-- ARTICLES LIST -->
    <div>
      <!-- STATS -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-card-num" id="statTotal">0</div>
          <div class="stat-card-label">Articles</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="statFille">0</div>
          <div class="stat-card-label">Fille</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="statBebe">0</div>
          <div class="stat-card-label">Bébé</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">📦 Articles publiés</div>
        <div class="panel-body" style="padding:16px;">
          <div class="articles-list" id="articlesList"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ===== CONFIG =====
  const ADMIN_PASSWORD = 'petitdressing2025'; // Change ce mot de passe !
  const STORAGE_KEY = 'petitdressing_articles';

  // ===== LOGIN =====
  function login() {
    const pwd = document.getElementById('passwordInput').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      sessionStorage.setItem('pd_admin', '1');
      chargerArticles();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  function logout() {
    sessionStorage.removeItem('pd_admin');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  // Auto-login si session active
  if (sessionStorage.getItem('pd_admin') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
  }

  // ===== IMAGE PREVIEW =====
  let imageBase64 = '';

  function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      imageBase64 = e.target.result;
      const preview = document.getElementById('imagePreview');
      preview.src = imageBase64;
      preview.style.display = 'block';
      document.querySelector('.upload-icon').textContent = '✅';
      document.querySelector('.upload-text').innerHTML = '<strong>' + file.name + '</strong>';
    };
    reader.readAsDataURL(file);
  }

  // ===== AJOUTER ARTICLE =====
  function ajouterArticle() {
    const nom = document.getElementById('artNom').value.trim();
    const cat = document.getElementById('artCat').value;
    const taille = document.getElementById('artTaille').value.trim();
    const prix = document.getElementById('artPrix').value.trim();
    const desc = document.getElementById('artDesc').value.trim();

    if (!nom || !taille || !prix) {
      alert('Veuillez remplir au moins le nom, la taille et le prix.');
      return;
    }

    const articles = getArticles();
    const newArticle = {
      id: Date.now(),
      nom, cat, taille, prix, desc,
      image: imageBase64,
      date: new Date().toLocaleDateString('fr-FR')
    };

    articles.push(newArticle);
    saveArticles(articles);

    // Reset form
    document.getElementById('artNom').value = '';
    document.getElementById('artTaille').value = '';
    document.getElementById('artPrix').value = '';
    document.getElementById('artDesc').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('imageInput').value = '';
    document.querySelector('.upload-icon').textContent = '📸';
    document.querySelector('.upload-text').innerHTML = '<strong>Cliquez pour choisir une photo</strong><br>ou glissez-déposez ici';
    imageBase64 = '';

    // Show success
    const msg = document.getElementById('successMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);

    chargerArticles();
  }

  // ===== SUPPRIMER =====
  function supprimerArticle(id) {
    if (!confirm('Supprimer cet article du site ?')) return;
    const articles = getArticles().filter(a => a.id !== id);
    saveArticles(articles);
    chargerArticles();
  }

  // ===== AFFICHER ARTICLES =====
  function chargerArticles() {
    const articles = getArticles();
    const list = document.getElementById('articlesList');

    // Stats
    document.getElementById('statTotal').textContent = articles.length;
    document.getElementById('statFille').textContent = articles.filter(a => a.cat === 'fille' || a.cat === 'set').length;
    document.getElementById('statBebe').textContent = articles.filter(a => a.cat === 'bebe').length;

    if (articles.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="empty-state-icon">📭</span>
          Aucun article publié pour l'instant.<br>
          Ajoutez votre premier article ci-contre !
        </div>`;
      return;
    }

    list.innerHTML = articles.slice().reverse().map(a => `
      <div class="article-item">
        <div class="article-item-img">
          ${a.image ? `<img src="${a.image}" alt="${a.nom}">` : '👕'}
        </div>
        <div class="article-item-info">
          <div class="article-item-name">${a.nom}</div>
          <div class="article-item-meta">
            <span class="cat-badge">${getCatLabel(a.cat)}</span>
            📏 ${a.taille} · ${a.date}
          </div>
        </div>
        <div class="article-item-price">${a.prix} <span>DH</span></div>
        <button class="btn-delete" onclick="supprimerArticle(${a.id})" title="Supprimer">🗑️</button>
      </div>
    `).join('');
  }

  function getCatLabel(cat) {
    const labels = { fille: '👧 Fille', garcon: '👦 Garçon', bebe: '👶 Bébé', set: '👕 Set' };
    return labels[cat] || cat;
  }

  function getArticles() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveArticles(articles) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(articles));
  }

  // Init
  if (sessionStorage.getItem('pd_admin') === '1') chargerArticles();
</script>
</body>
</html>
